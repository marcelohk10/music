    <style>
        /* ===== RESET ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {

        .search-box input {

        /* ===== RESULTADOS ===== */

        #artwork {
            width: 150px;

            object-fit: cover;
            margin: 0 auto 12px;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);

        #song-title {
            font-size: 1.6rem;

        }
        #song-artist {

        /* ===== BOTÕES DE AÇÃO ===== */
        .action-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;

        .action-btn.share { background: #007bff; }
        .action-btn.preview { background: #ff7a00; }

        /* ===== PLATAFORMAS ===== */
        #links-container {
            display: flex;

            gap: 8px;
            margin: 12px 0;
        }
        .platform-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;

            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
            border: 1px solid transparent;

        .platform-btn:active { transform: scale(0.98); }
        .platform-btn:hover { background: #2a2a2a; border-color: #444; }

            align-items: center;
            gap: 10px;

        .appleMusic .left .icon { color: #FA58D8; }
        .deezer .left .icon { color: #FEAA2D; }
        .youtubeMusic .left .icon { color: #FF0000; }
        .amazonMusic .left .icon { color: #00A8E1; }
        .soundCloud .left .icon { color: #FF5500; }
        .tiktokMusic .left .icon { color: #FF0050; }
        .tidal .left .icon { color: #00ffff; }

        /* ===== SOCIAL ===== */
        #social-links-container {
            border-top: 1px solid #2a2a2a;

        /* ===== EMBEDS ===== */
        #embed-container {

        }

            font-size: 0.9rem;

        }
        .embed-card {

        /* ===== COMPARTILHAMENTO RÁPIDO ===== */
        .share-row {

        /* ===== PLAYER FIXO ===== */

            padding: 12px 20px;

            align-items: center;

        #fixed-player .player-art {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }
        #fixed-player .player-info {
            flex: 1;
            min-width: 0;
        }
        #fixed-player .player-info .track {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        #fixed-player .player-info .artist {
            font-size: 0.8rem;
            color: #b3b3b3;

        #fixed-player .player-controls {

            align-items: center;
            gap: 8px;

        #fixed-player .player-controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 4px 8px;

        #fixed-player .player-controls button:active { transform: scale(0.8); }

        /* ===== LOADING ===== */
        #loading {
            text-align: center;
            padding: 20px 0;

        }
        .spinner {

            border: 3px solid #333;

        /* ===== RESPONSIVO ===== */
        @media (max-width: 480px) {

            .header h1 { font-size: 1.6rem; }

            #fixed-player { padding: 10px 14px; }
            #fixed-player .player-controls button { font-size: 1.4rem; }

</head>
<body>

<div class="container">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <h1>🎵 Marcelo Hacker</h1>
        <p>Ouça agora em todas as plataformas</p>
    </div>

    <!-- ===== BUSCA ===== -->
    <div class="card search-box" id="search-box">
        <input type="text" id="artist-input" placeholder="Artista (ex: Marcelo Hacker)" value="Marcelo Hacker" />
        <input type="text" id="song-input" placeholder="Nome da música" />
        <button id="search-button">🔍 Buscar Links</button>
        <div id="loading"><div class="spinner"></div> Carregando...</div>
    </div>

    <!-- ===== RESULTADOS ===== -->
    <div id="results-container" style="display: none;">
        <div class="card" id="song-info">
            <img id="artwork" src="" alt="Capa" />
            <h2 id="song-title"></h2>
            <p id="song-artist"></p>
            <div class="action-row">
                <button id="share-button" class="action-btn share" style="display: none;">📤 Compartilhar</button>
                <button id="preview-button" class="action-btn preview" style="display: none;">▶ Ouvir prévia</button>
            </div>
        </div>

        <div class="card" id="links-card">
            <div id="links-container"></div>

            <div id="social-links-container">
                <h3>📲 Usar esta música em seu post</h3>
                <div id="social-buttons"></div>
            </div>

            <div class="share-row" id="quick-share-row">
                <a href="#" class="whatsapp" id="share-wa" title="WhatsApp">💬</a>
                <a href="#" class="twitter" id="share-tw" title="Twitter">🐦</a>
                <a href="#" class="facebook" id="share-fb" title="Facebook">📘</a>
                <a href="#" class="telegram" id="share-tg" title="Telegram">✈️</a>
                <a href="#" class="copy-link" id="share-copy" title="Copiar link">📋</a>
            </div>

            <div class="like-section">
                <span>❤️ <span id="like-count">0</span> curtidas</span>
                <button class="like-btn" id="like-btn">Curtir</button>
            </div>
        </div>

        <div class="card" id="embed-container">
            <h3>🎧 Ouvir aqui também</h3>
            <div id="embed-content"></div>
        </div>
    </div>
</div>

<!-- ===== PLAYER FIXO ===== -->
<div id="fixed-player">
    <img id="player-art" class="player-art" src="" alt="capa" />
    <div class="player-info">
        <div class="track" id="player-track">Título</div>
        <div class="artist" id="player-artist">Artista</div>
    </div>
    <div class="player-controls">
        <button id="player-play" class="play-btn">▶</button>
    </div>
</div>

<script>
    // ========================================================================
    //  CÓDIGO PRINCIPAL – COM DEEP LINKS E PLAYER FIXO
    // ========================================================================

    // ----- ELEMENTOS -----
    const artistInput = document.getElementById('artist-input');
    const songInput = document.getElementById('song-input');
    const searchBtn = document.getElementById('search-button');
    const loading = document.getElementById('loading');
    const resultsContainer = document.getElementById('results-container');
    const artwork = document.getElementById('artwork');
    const songTitle = document.getElementById('song-title');
    const songArtist = document.getElementById('song-artist');
    const linksContainer = document.getElementById('links-container');
    const socialLinksContainer = document.getElementById('social-links-container');
    const socialBtns = document.getElementById('social-buttons');
    const embedContainer = document.getElementById('embed-container');
    const embedContent = document.getElementById('embed-content');
    const shareBtn = document.getElementById('share-button');
    const previewBtn = document.getElementById('preview-button');
    const likeBtn = document.getElementById('like-btn');
    const likeCountSpan = document.getElementById('like-count');

    // Player fixo
    const fixedPlayer = document.getElementById('fixed-player');
    const playerArt = document.getElementById('player-art');
    const playerTrack = document.getElementById('player-track');
    const playerArtist = document.getElementById('player-artist');
    const playerPlayBtn = document.getElementById('player-play');

    // ----- PARÂMETROS DA URL -----
    const params = new URLSearchParams(window.location.search);
    const artistaUrl = params.get('artista') || 'Marcelo Hacker';
    const musicaUrl = params.get('musica');
    const artworkUrl = params.get('artwork_url');
    const tiktokUrl = params.get('tiktok_url');
    const instagramUrl = params.get('ig_url');
    const youtubeIdParam = params.get('youtube_id');
    const youtubeUrlParam = params.get('youtube_url');
    const soundcloudUrlParam = params.get('soundcloud_url');

    // ----- ESTADO -----
    let currentArtist = artistaUrl || '';
    let currentSong = musicaUrl || '';
    let currentPreviewUrl = '';
    let previewAudio = null;
    let likeCount = parseInt(localStorage.getItem('musicLikeCount') || '0', 10);
    let liked = localStorage.getItem('musicLiked') === 'true';

    // Inicializa curtidas
    likeCountSpan.textContent = likeCount;
    if (liked) { likeBtn.classList.add('liked'); likeBtn.textContent = '❤️ Curtido'; }

    // ----- RASTREAMENTO -----
    function trackEvent(eventName, params = {}) {
        console.log(`[Analytics] ${eventName}`, params);
        if (typeof gtag === 'function') {
            gtag('event', eventName, { ...params, transport: 'beacon' });
        }
        if (typeof ttq !== 'undefined' && ttq.track) {
            ttq.track(eventName, params);
        }
    }

    // ----- ABRIR LINK COM RASTREAMENTO E DEEP LINK -----
    function openTrackedLink(url, eventName, extraParams = {}) {
        // Tenta abrir com deep link (app) se for uma URL especial
        let finalUrl = url;
        // Se for Spotify, tenta usar o URI para abrir no app
        if (url.includes('open.spotify.com/track/')) {
            const trackId = url.match(/\/track\/([a-zA-Z0-9]+)/);
            if (trackId) {
                // Tenta abrir no app primeiro (spotify://)
                const deepUrl = `spotify://track/${trackId[1]}?autoplay=true`;
                // Abre o deep link (se falhar, o navegador pode redirecionar para a web)
                try {
                    const w = window.open(deepUrl, '_blank');
                    if (!w) { /* fallback */ }
                } catch(e) {}
                // Também abre a web em segundo plano (fallback)
                setTimeout(() => window.open(url, '_blank', 'noopener,noreferrer'), 200);
                trackEvent(eventName, { ...extraParams, destination_url: url, deep_link: true });
                return;
            }
        }
        // Fallback: abrir diretamente
        window.open(url, '_blank', 'noopener,noreferrer');
        trackEvent(eventName, { ...extraParams, destination_url: url });
    }

    // ----- GERAR URL DE COMPARTILHAMENTO -----
    function getShareUrl() {
        const base = 'https://marcelohk10.github.io/music/';
        const p = new URLSearchParams();
        if (currentArtist) p.set('artista', currentArtist);
        if (currentSong) p.set('musica', currentSong);
        if (artworkUrl) p.set('artwork_url', artworkUrl);
        if (tiktokUrl) p.set('tiktok_url', tiktokUrl);
        if (instagramUrl) p.set('ig_url', instagramUrl);
        if (youtubeIdParam) p.set('youtube_id', youtubeIdParam);
        if (youtubeUrlParam) p.set('youtube_url', youtubeUrlParam);
        if (soundcloudUrlParam) p.set('soundcloud_url', soundcloudUrlParam);
        const query = p.toString();
        return query ? base + '?' + query : base;
    }

    function getShareText() {
        if (currentSong && currentArtist) return `🎵 Ouça "${currentSong}" de ${currentArtist} em todas as plataformas:`;
        if (currentSong) return `🎵 Ouça "${currentSong}" em todas as plataformas:`;
        return '🎵 Ouça esta música em todas as plataformas:';
    }

    // ----- CONFIGURAR COMPARTILHAMENTO RÁPIDO -----
    function setupQuickShare() {
        const shareUrl = getShareUrl();
        const text = getShareText();
        const encodedText = encodeURIComponent(text);
        const encodedUrl = encodeURIComponent(shareUrl);

        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${encodedText}%20${encodedUrl}`;
        document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`;
        document.getElementById('share-tg').href = `https://t.me/share/url?url=${encodedUrl}&text=${encodedText}`;

        const copyBtn = document.getElementById('share-copy');
        copyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    copyBtn.textContent = '✅';
                    setTimeout(() => copyBtn.textContent = '📋', 2000);
                    trackEvent('click_share', { link_tipo: 'Copiar link rápido', musica: currentSong });
                });
            } else {
                alert('Copie o link: ' + shareUrl);
            }
        });

        // Rastrear cliques nos botões de share
        document.querySelectorAll('.share-row a').forEach(el => {
            if (el.id !== 'share-copy') {
                el.addEventListener('click', () => {
                    const rede = el.className.split(' ')[0] || 'desconhecido';
                    trackEvent('click_share', { link_tipo: `Compartilhar ${rede}`, musica: currentSong });
                });
            }
        });
    }

    // ----- PLAYER FIXO -----
    function updateFixedPlayer(song, artist, image, previewUrl) {
        if (!song && !artist) {
            fixedPlayer.style.display = 'none';
            return;
        }
        playerTrack.textContent = song || 'Música';
        playerArtist.textContent = artist || 'Artista';
        if (image) playerArt.src = image;
        playerArt.style.display = image ? 'block' : 'none';
        fixedPlayer.style.display = 'flex';

        // Guarda a URL de prévia no botão
        playerPlayBtn.dataset.previewUrl = previewUrl || '';

        // Se não tiver prévia, desabilita o play
        if (!previewUrl) {
            playerPlayBtn.textContent = '⏸'; // ou algum ícone indicando indisponível
            playerPlayBtn.disabled = true;
            playerPlayBtn.style.opacity = '0.5';
        } else {
            playerPlayBtn.disabled = false;
            playerPlayBtn.style.opacity = '1';
            playerPlayBtn.textContent = '▶';
        }
    }

    // Controle do player fixo
    let playerAudio = null;
    playerPlayBtn.addEventListener('click', () => {
        const url = playerPlayBtn.dataset.previewUrl;
        if (!url) return;
        if (!playerAudio) {
            playerAudio = new Audio(url);
            playerAudio.onended = () => {
                playerPlayBtn.textContent = '▶';
            };
        }
        if (playerAudio.paused) {
            playerAudio.play().then(() => {
                playerPlayBtn.textContent = '⏸';
                trackEvent('click_preview', { musica: currentSong, link_tipo: 'Player fixo' });
            }).catch(() => {});
        } else {
            playerAudio.pause();
            playerPlayBtn.textContent = '▶';
        }
    });

    // ----- RENDERIZAR EMBEDS -----
    function renderEmbeds() {
        embedContent.innerHTML = '';
        const youtubeId = youtubeIdParam || extractYouTubeId(youtubeUrlParam);
        const hasYt = Boolean(youtubeId);
        const hasSc = Boolean(soundcloudUrlParam);

        if (!hasYt && !hasSc) {
            embedContainer.style.display = 'none';
            return;
        }

        if (hasYt) {
            const card = document.createElement('div');
            card.className = 'embed-card';
            card.innerHTML = `
                <div class="embed-header">
                    <span>▶ YouTube</span>
                    <a href="https://www.youtube.com/watch?v=${youtubeId}" target="_blank">Abrir ↗</a>
                </div>
                <iframe class="embed-frame" height="280" src="https://www.youtube.com/embed/${youtubeId}?autoplay=0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen loading="lazy"></iframe>
            `;
            embedContent.appendChild(card);
            card.querySelector('a').addEventListener('click', (e) => {
                e.preventDefault();
                openTrackedLink(`https://www.youtube.com/watch?v=${youtubeId}`, 'click_youtube', { link_tipo: 'Abrir YouTube embed' });
            });
        }

        if (hasSc) {
            const embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(soundcloudUrlParam)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&visual=true`;
            const card = document.createElement('div');
            card.className = 'embed-card';
            card.innerHTML = `
                <div class="embed-header"><span>🎧 SoundCloud</span></div>
                <iframe class="embed-frame" height="166" scrolling="no" allow="autoplay"
                    src="${embedUrl}" loading="lazy"></iframe>
            `;
            embedContent.appendChild(card);
        }
        embedContainer.style.display = 'block';
    }

    // ----- EXTRATOR YOUTUBE ID -----
    function extractYouTubeId(input) {
        if (!input) return '';
        if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
        try {
            const url = new URL(input);
            if (url.hostname.includes('youtu.be')) return url.pathname.replace('/', '');
            const v = url.searchParams.get('v');
            if (v) return v;
            const match = url.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        } catch(e) {}
        return '';
    }

    // ----- CRIAR BOTÃO DE PLATAFORMA (COM ÍCONE) -----
    function createPlatformButton(name, url, cssClass, icon) {
        const a = document.createElement('a');
        a.className = `platform-btn ${cssClass}`;
        a.innerHTML = `<span class="left"><span class="icon">${icon}</span> ${name}</span><span class="arrow">➜</span>`;
        a.href = '#';
        a.addEventListener('click', (e) => {
            e.preventDefault();
            openTrackedLink(url, 'click_streaming', {
                link_tipo: name,
                plataforma: name,
                musica: currentSong,
                artista: currentArtist
            });
        });
        linksContainer.appendChild(a);
    }

    // ----- CRIAR BOTÃO SOCIAL -----
    function createSocialButton(text, url, cssClass) {
        const a = document.createElement('a');
        a.className = `social-btn ${cssClass}`;
        a.textContent = text;
        a.href = '#';
        a.addEventListener('click', (e) => {
            e.preventDefault();
            openTrackedLink(url, 'click_social_sound', {
                link_tipo: text,
                musica: currentSong,
                artista: currentArtist
            });
        });
        socialBtns.appendChild(a);
    }

    // ----- BUSCA PRINCIPAL -----
    async function searchMusic() {
        const artist = artistInput.value.trim() || currentArtist;
        const song = songInput.value.trim() || currentSong;
        if (!artist || !song) {
            alert('Preencha o artista e a música.');
            return;
        }

        currentArtist = artist;
        currentSong = song;
        loading.style.display = 'block';
        resultsContainer.style.display = 'none';
        linksContainer.innerHTML = '';
        socialBtns.innerHTML = '';
        artwork.style.display = 'none';
        previewBtn.style.display = 'none';
        previewBtn.classList.remove('is-playing');
        if (previewAudio) { previewAudio.pause(); previewAudio = null; }
        currentPreviewUrl = '';

        const query = `${artist} ${song}`;
        trackEvent('search_submitted', { artista: artist, musica: song, query });

        // 1. iTunes (Apple Music + capa + prévia)
        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1&country=BR`);
            const data = await resp.json();
            if (data.results && data.results.length) {
                const track = data.results[0];
                if (track.artworkUrl100) {
                    artwork.src = track.artworkUrl100.replace('100x100', '300x300');
                    artwork.style.display = 'block';
                }
                songTitle.textContent = track.trackName || song;
                songArtist.textContent = track.artistName || artist;
                currentPreviewUrl = track.previewUrl || '';
                if (currentPreviewUrl) {
                    previewBtn.style.display = 'block';
                    previewBtn.textContent = '▶ Ouvir prévia';
                }
                createPlatformButton('Apple Music', track.trackViewUrl, 'appleMusic', '🍏');
                // Atualiza player fixo
                updateFixedPlayer(track.trackName, track.artistName, artwork.src, currentPreviewUrl);
            } else {
                songTitle.textContent = song;
                songArtist.textContent = artist;
                updateFixedPlayer(song, artist, artworkUrl || '', '');
            }
        } catch (e) {
            console.warn('iTunes error:', e);
            songTitle.textContent = song;
            songArtist.textContent = artist;
            updateFixedPlayer(song, artist, artworkUrl || '', '');
        }

        // 2. Artwork da URL (fallback)
        if (!artwork.style.display || artwork.style.display === 'none') {
            if (artworkUrl) {
                artwork.src = artworkUrl;
                artwork.style.display = 'block';
                // Atualiza player com imagem
                const playerImg = document.getElementById('player-art');
                playerImg.src = artworkUrl;
                playerImg.style.display = 'block';
            }
        }

        // 3. Deezer via JSONP
        try {
            const deezerData = await searchDeezer(query);
            if (deezerData) {
                createPlatformButton('Deezer', deezerData.link, 'deezer', '🎧');
            }
        } catch (e) { console.warn('Deezer error:', e); }

        // 4. Plataformas fixas (com ícones)
        const platforms = [
            { name: 'Spotify', url: `https://open.spotify.com/search/${encodeURIComponent(query)}`, cls: 'spotify', icon: '🟢' },
            { name: 'YouTube Music', url: `https://music.youtube.com/search?q=${encodeURIComponent(query)}`, cls: 'youtubeMusic', icon: '▶️' },
            { name: 'TikTok Music', url: `https://www.tiktok.com/search/music?q=${encodeURIComponent(query)}`, cls: 'tiktokMusic', icon: '🎵' },
            { name: 'Amazon Music', url: `https://music.amazon.com.br/search/${encodeURIComponent(query)}`, cls: 'amazonMusic', icon: '📦' },
            { name: 'SoundCloud', url: `https://soundcloud.com/search/sounds?q=${encodeURIComponent(query)}`, cls: 'soundCloud', icon: '☁️' },
            { name: 'Tidal', url: `https://listen.tidal.com/search?q=${encodeURIComponent(query)}`, cls: 'tidal', icon: '🌊' }
        ];
        platforms.forEach(p => createPlatformButton(p.name, p.url, p.cls, p.icon));

        // 5. Links sociais
        let hasSocial = false;
        if (tiktokUrl) { createSocialButton('🎵 Usar Som no TikTok', tiktokUrl, 'tiktok'); hasSocial = true; }
        if (instagramUrl) { createSocialButton('📸 Usar Som no Instagram', instagramUrl, 'instagram'); hasSocial = true; }
        socialLinksContainer.style.display = hasSocial ? 'block' : 'none';

        // 6. Botão de compartilhar (nativo)
        if (navigator.share) {
            shareBtn.style.display = 'block';
            shareBtn.textContent = '📤 Compartilhar link';
            shareBtn.onclick = () => {
                navigator.share({
                    title: songTitle.textContent || 'Música',
                    text: getShareText(),
                    url: getShareUrl()
                }).then(() => trackEvent('click_share', { link_tipo: 'Compartilhar nativo', musica: currentSong }));
            };
        } else if (navigator.clipboard) {
            shareBtn.style.display = 'block';
            shareBtn.textContent = '📋 Copiar link';
            shareBtn.onclick = () => {
                navigator.clipboard.writeText(getShareUrl()).then(() => {
                    shareBtn.textContent = '✅ Copiado!';
                    setTimeout(() => shareBtn.textContent = '📋 Copiar link', 2000);
                    trackEvent('click_share', { link_tipo: 'Copiar link', musica: currentSong });
                });
            };
        }

        // 7. Botão de prévia (separado)
        previewBtn.onclick = () => {
            if (!currentPreviewUrl) return;
            if (!previewAudio) {
                previewAudio = new Audio(currentPreviewUrl);
                previewAudio.onended = () => {
                    previewBtn.textContent = '▶ Ouvir prévia';
                    previewBtn.classList.remove('is-playing');
                };
            }
            if (previewAudio.paused) {
                previewAudio.play().then(() => {
                    previewBtn.textContent = '⏸ Pausar';
                    previewBtn.classList.add('is-playing');
                    trackEvent('click_preview', { musica: currentSong, link_tipo: 'Preview iTunes' });
                }).catch(() => {});
            } else {
                previewAudio.pause();
                previewBtn.textContent = '▶ Ouvir prévia';
                previewBtn.classList.remove('is-playing');
            }
        };

        // 8. Compartilhamento rápido
        setupQuickShare();

        // 9. Embeds
        renderEmbeds();

        // 10. Exibir resultados
        resultsContainer.style.display = 'block';
        loading.style.display = 'none';

        trackEvent('results_rendered', { musica: currentSong, artista: currentArtist });
    }

    // ----- DEEZER (JSONP) -----
    function searchDeezer(query) {
        return new Promise((resolve, reject) => {
            const callback = 'deezerCb' + Date.now();
            const script = document.createElement('script');
            window[callback] = function(data) {
                try { document.body.removeChild(script); } catch(e) {}
                delete window[callback];
                if (data && data.data && data.data.length) resolve(data.data[0]);
                else resolve(null);
            };
            script.src = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&output=jsonp&callback=${callback}`;
            script.onerror = () => reject(new Error('Deezer fail'));
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callback]) {
                    try { document.body.removeChild(script); } catch(e) {}
                    delete window[callback];
                    resolve(null);
                }
            }, 4000);
        });
    }

    // ----- CURTIR -----
    likeBtn.addEventListener('click', () => {
        if (!liked) {
            liked = true;
            likeCount++;
            localStorage.setItem('musicLikeCount', String(likeCount));
            localStorage.setItem('musicLiked', 'true');
            likeCountSpan.textContent = likeCount;
            likeBtn.textContent = '❤️ Curtido';
            likeBtn.classList.add('liked');
            trackEvent('like_music', { musica: currentSong, artista: currentArtist });
        } else {
            liked = false;
            likeCount--;
            localStorage.setItem('musicLikeCount', String(likeCount));
            localStorage.setItem('musicLiked', 'false');
            likeCountSpan.textContent = likeCount;
            likeBtn.textContent = 'Curtir';
            likeBtn.classList.remove('liked');
        }
    });

    // ----- INICIALIZAÇÃO -----
    window.addEventListener('load', () => {
        // Se tiver parâmetros, busca automaticamente
        if (artistaUrl && musicaUrl) {
            artistInput.value = artistaUrl;
            songInput.value = musicaUrl;
            currentArtist = artistaUrl;
            currentSong = musicaUrl;
            document.getElementById('search-box').style.display = 'none';
            searchMusic();
        } else {
            // Já deixa o artista padrão
            artistInput.value = 'Marcelo Hacker';
        }

        // Evento de busca
        searchBtn.addEventListener('click', searchMusic);
        artistInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchMusic(); });
        songInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchMusic(); });
    });
</script>
