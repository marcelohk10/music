<body>

<div class="container">

    <!-- ========== HEADER ========== -->
    <div class="header">

                <button id="share-button" class="action-btn share" style="display: none;">📤 Compartilhar</button>

<script>
    // ========================================================================
    //  CÓDIGO PRINCIPAL – CORRIGIDO
    // ========================================================================

    // ----- ELEMENTOS DOM -----
    const artistInput = document.getElementById('artist-input');
    const songInput = document.getElementById('song-input');
    const searchBtn = document.getElementById('search-button');
    const loading = document.getElementById('loading');
    const resultsContainer = document.getElementById('results-container');
    const artwork = document.getElementById('artwork');
    const songTitle = document.getElementById('song-title');
    const songArtist = document.getElementById('song-artist');
    const linksContainer = document.getElementById('links-container');
    const socialLinksContainer = document.getElementById('social-links-container');
    const socialBtns = document.getElementById('social-buttons');
    const embedContainer = document.getElementById('embed-container');
    const embedContent = document.getElementById('embed-content');
    const shareBtn = document.getElementById('share-button');
    const previewBtn = document.getElementById('preview-button');
    const likeBtn = document.getElementById('like-btn');
    const likeCountSpan = document.getElementById('like-count');
    const albumGrid = document.getElementById('album-grid');
    const rankingList = document.getElementById('ranking-list');

    // ----- PARÂMETROS DA URL -----
    const params = new URLSearchParams(window.location.search);
    const artistaUrl = params.get('artista');
    const musicaUrl = params.get('musica');
    const artworkUrl = params.get('artwork_url');
    const tiktokUrl = params.get('tiktok_url');
    const instagramUrl = params.get('ig_url');
    const youtubeIdParam = params.get('youtube_id');
    const youtubeUrlParam = params.get('youtube_url');
    const soundcloudUrlParam = params.get('soundcloud_url');

    // ----- ESTADO -----
    let currentArtist = '';
    let currentSong = '';
    let currentPreviewUrl = '';
    let previewAudio = null;
    let likeCount = parseInt(localStorage.getItem('musicLikeCount') || '0', 10);
    let liked = localStorage.getItem('musicLiked') === 'true';

    likeCountSpan.textContent = likeCount;
    if (liked) { likeBtn.classList.add('liked'); likeBtn.textContent = '❤️ Curtido'; }

    // ========================================================================
    //  RANKING – CORRIGIDO (sem [object Object])
    // ========================================================================
    function getRanking() {
        try {
            const data = localStorage.getItem('musicRanking');
            if (!data) return {};
            const parsed = JSON.parse(data);
            if (typeof parsed === 'object' && parsed !== null) {
                return parsed;
            }
            return {};
        } catch (e) {
            console.warn('Erro ao ler ranking:', e);
            return {};
        }
    }

    function saveRanking(ranking) {
        try {
            localStorage.setItem('musicRanking', JSON.stringify(ranking));
        } catch (e) { /* ignora */ }
    }

    // Inicializa com dados falsos (nomes reais)
    function initRankingWithFakeData() {
        const ranking = getRanking();
        if (Object.keys(ranking).length === 0) {
            const fake = {
                'Bandido Acústico||Marcelo Hacker': 1580,
                'Fé||Marcelo Hacker': 1120,
                'Rei da Guerra||Marcelo Hacker': 890,
                'Vida Loka||Marcelo Hacker': 670,
                'O Som da Favela||Marcelo Hacker': 420,
                'A Noite Inteira||Marcelo Hacker': 310,
                'Coração na Mão||Marcelo Hacker': 230,
                'Maluca||Marcelo Hacker': 180,
                'Fim de Tarde||Marcelo Hacker': 120
            };
            saveRanking(fake);
        }
    }

    function incrementRanking(song, artist) {
        if (!song) return;
        const key = `${song}||${artist || ''}`;
        const ranking = getRanking();
        ranking[key] = (ranking[key] || 0) + 1;
        saveRanking(ranking);
        renderRanking();
    }

    function renderRanking() {
        const ranking = getRanking();
        const entries = Object.entries(ranking)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 10);

        rankingList.innerHTML = '';
        if (entries.length === 0) {
            rankingList.innerHTML = '<li class="ranking-empty">Nenhuma música acessada ainda.</li>';
            return;
        }

        entries.forEach(([key, count], index) => {
            // Divide a chave no formato "nome||artista"
            const parts = key.split('||');
            const songName = parts[0] || 'Música';
            const artistName = parts[1] || '';

            const li = document.createElement('li');
            const rankClass = index === 0 ? 'gold' : index === 1 ? 'silver' : index === 2 ? 'bronze' : '';
            li.innerHTML = `
                <span class="rank ${rankClass}">#${index + 1}</span>
                <span class="music-name">${songName}${artistName ? ' · ' + artistName : ''}</span>
                <span class="count">${count} cliques</span>
            `;
            li.addEventListener('click', () => {
                artistInput.value = artistName || 'Marcelo Hacker';
                songInput.value = songName;
                searchMusic();
            });
            rankingList.appendChild(li);
        });
    }

    // ========================================================================
    //  ÁLBUNS – AGORA VOCÊ MESMO PREENCHE (vazio por padrão)
    // ========================================================================
    // 🔽 COLOQUE AQUI OS SEUS ÁLBUNS (exemplo abaixo, remova ou edite)
    const albumsData = [
        // Exemplo:
        // { name: 'Bandido Acústico', year: '2024', artist: 'Marcelo Hacker' },
        // { name: 'Marcelo Hacker - EP', year: '2023', artist: 'Marcelo Hacker' }
    ];

    async function fetchAlbumArt(albumName, artistName) {
        const query = `${albumName} ${artistName}`;
        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=album&limit=1&country=BR`);
            const data = await resp.json();
            if (data.results && data.results.length > 0) {
                const album = data.results[0];
                return album.artworkUrl100 ? album.artworkUrl100.replace('100x100', '600x600') : null;
            }
        } catch (e) { /* silencioso */ }
        return null;
    }

    async function renderAlbums() {
        if (albumsData.length === 0) {
            albumGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#b3b3b3;padding:20px 0;">Nenhum álbum cadastrado ainda.</div>';
            return;
        }

        albumGrid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#b3b3b3;">Carregando capas...</div>';

        const albumPromises = albumsData.map(async (album) => {
            const cover = await fetchAlbumArt(album.name, album.artist);
            return { ...album, cover };
        });

        const albumsWithCovers = await Promise.all(albumPromises);

        albumGrid.innerHTML = '';
        albumsWithCovers.forEach(album => {
            const div = document.createElement('div');
            div.className = 'album-card';
            const coverSrc = album.cover || 'https://via.placeholder.com/600/181818/FFFFFF?text=No+Cover';
            div.innerHTML = `
                <img src="${coverSrc}" alt="${album.name}" 
                     onerror="this.src='https://via.placeholder.com/600/181818/FFFFFF?text=No+Cover'" />
                <div class="album-info">
                    <div class="album-name">${album.name}</div>
                    <div class="album-year">${album.year || ''}</div>
                    <div class="album-links">
                        <a href="#" class="spotify" data-album="${album.name}">Spotify</a>
                        <a href="#" class="apple" data-album="${album.name}">Apple</a>
                        <a href="#" class="youtube" data-album="${album.name}">YouTube</a>
                        <a href="#" class="deezer" data-album="${album.name}">Deezer</a>
                    </div>
                </div>
            `;
            div.querySelectorAll('.album-links a').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const albumName = link.dataset.album;
                    artistInput.value = 'Marcelo Hacker';
                    songInput.value = albumName;
                    searchMusic();
                });
            });
            albumGrid.appendChild(div);
        });
    }

    // ========================================================================
    //  RASTREAMENTO (Google, TikTok, Facebook)
    // ========================================================================
    function trackEvent(eventName, params = {}) {
        if (typeof gtag === 'function') {
            gtag('event', eventName, { ...params, transport: 'beacon' });
        }
        if (typeof ttq !== 'undefined' && ttq.track) {
            ttq.track(eventName, params);
        }
        if (typeof fbq === 'function') {
            fbq('trackCustom', eventName, params);
        }
    }

    function openTrackedLink(url, eventName, extraParams = {}) {
        let newWindow = null;
        try {
            newWindow = window.open(url, '_blank', 'noopener,noreferrer');
        } catch (e) {}
        if (!newWindow) {
            setTimeout(() => window.open(url, '_blank', 'noopener,noreferrer'), 100);
        }
        if (currentSong) {
            incrementRanking(currentSong, currentArtist);
        }
        trackEvent(eventName, {
            ...extraParams,
            destination_url: url,
            musica: currentSong || songInput.value || '',
            artista: currentArtist || artistInput.value || '',
            source: 'manual'
        });
    }

    // ========================================================================
    //  UI (meta tags, compartilhamento, embeds, etc.)
    // ========================================================================
    function updateMetaTags(title, description, image) {
        const ogTitle = document.querySelector('meta[property="og:title"]');
        const ogDesc = document.querySelector('meta[property="og:description"]');
        const ogImage = document.querySelector('meta[property="og:image"]');
        if (ogTitle) ogTitle.setAttribute('content', title || '🎵 Marcelo Hacker');
        if (ogDesc) ogDesc.setAttribute('content', description || 'Ouça agora');
        if (ogImage && image) ogImage.setAttribute('content', image);
        const twTitle = document.querySelector('meta[name="twitter:title"]');
        const twDesc = document.querySelector('meta[name="twitter:description"]');
        const twImage = document.querySelector('meta[name="twitter:image"]');
        if (twTitle) twTitle.setAttribute('content', title || '🎵 Marcelo Hacker');
        if (twDesc) twDesc.setAttribute('content', description || 'Ouça agora');
        if (twImage && image) twImage.setAttribute('content', image);
        document.title = title || '🎵 Marcelo Hacker';
    }

    function getShareUrl() {
        const base = 'https://marcelohk10.github.io/music/';
        const p = new URLSearchParams();
        if (currentArtist) p.set('artista', currentArtist);
        if (currentSong) p.set('musica', currentSong);
        if (artworkUrl) p.set('artwork_url', artworkUrl);
        if (tiktokUrl) p.set('tiktok_url', tiktokUrl);
        if (instagramUrl) p.set('ig_url', instagramUrl);
        if (youtubeIdParam) p.set('youtube_id', youtubeIdParam);
        if (youtubeUrlParam) p.set('youtube_url', youtubeUrlParam);
        if (soundcloudUrlParam) p.set('soundcloud_url', soundcloudUrlParam);
        const query = p.toString();
        return query ? base + '?' + query : base;
    }

    function getShareText() {
        if (currentSong && currentArtist) return `🎵 Ouça "${currentSong}" de ${currentArtist} em todas as plataformas:`;
        if (currentSong) return `🎵 Ouça "${currentSong}" em todas as plataformas:`;
        return '🎵 Ouça esta música em todas as plataformas:';
    }

    function setupQuickShare() {
        const shareUrl = getShareUrl();
        const text = getShareText();
        const encodedText = encodeURIComponent(text);
        const encodedUrl = encodeURIComponent(shareUrl);

        document.getElementById('share-wa').href = `https://api.whatsapp.com/send?text=${encodedText}%20${encodedUrl}`;
        document.getElementById('share-tw').href = `https://twitter.com/intent/tweet?text=${encodedText}&url=${encodedUrl}`;
        document.getElementById('share-fb').href = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`;
        document.getElementById('share-tg').href = `https://t.me/share/url?url=${encodedUrl}&text=${encodedText}`;

        const copyBtn = document.getElementById('share-copy');
        copyBtn.addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.clipboard) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    copyBtn.textContent = '✅';
                    setTimeout(() => copyBtn.textContent = '📋', 2000);
                    trackEvent('click_share', { link_tipo: 'Copiar link rápido', musica: currentSong });
                });
            } else {
                alert('Copie o link manualmente: ' + shareUrl);
            }
        });

        document.querySelectorAll('.share-row a').forEach(el => {
            if (el.id !== 'share-copy') {
                el.addEventListener('click', () => {
                    const rede = el.className.split(' ')[0] || 'desconhecido';
                    trackEvent('click_share', { link_tipo: `Compartilhar ${rede}`, musica: currentSong });
                });
            }
        });
    }

    function renderEmbeds() {
        embedContent.innerHTML = '';
        const youtubeId = youtubeIdParam || extractYouTubeId(youtubeUrlParam);
        const hasYt = Boolean(youtubeId);
        const hasSc = Boolean(soundcloudUrlParam);

        if (!hasYt && !hasSc) {
            embedContainer.style.display = 'none';
            return;
        }

        if (hasYt) {
            const card = document.createElement('div');
            card.className = 'embed-card';
            card.innerHTML = `
                <div class="embed-header">
                    <span>▶ YouTube</span>
                    <a href="https://www.youtube.com/watch?v=${youtubeId}" target="_blank">Abrir ↗</a>
                </div>
                <iframe class="embed-frame" height="280" src="https://www.youtube.com/embed/${youtubeId}" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen loading="lazy"></iframe>
            `;
            embedContent.appendChild(card);
            card.querySelector('a').addEventListener('click', (e) => {
                e.preventDefault();
                const url = `https://www.youtube.com/watch?v=${youtubeId}`;
                openTrackedLink(url, 'click_youtube', { link_tipo: 'Abrir YouTube embed' });
            });
        }

        if (hasSc) {
            const embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(soundcloudUrlParam)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&visual=true`;
            const card = document.createElement('div');
            card.className = 'embed-card';
            card.innerHTML = `
                <div class="embed-header">
                    <span>🎧 SoundCloud</span>
                </div>
                <iframe class="embed-frame" height="166" scrolling="no" allow="autoplay"
                    src="${embedUrl}" loading="lazy"></iframe>
            `;
            embedContent.appendChild(card);
        }

        embedContainer.style.display = 'block';
    }

    function extractYouTubeId(input) {
        if (!input) return '';
        if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
        try {
            const url = new URL(input);
            if (url.hostname.includes('youtu.be')) return url.pathname.replace('/', '').trim();
            const v = url.searchParams.get('v');
            if (v) return v;
            const match = url.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
            if (match) return match[1];
        } catch (e) {}
        return '';
    }

    // ========================================================================
    //  BOTÕES DAS PLATAFORMAS E SOCIAIS
    // ========================================================================
    function createPlatformButton(name, url, cssClass) {
        const a = document.createElement('a');
        a.className = `platform-btn ${cssClass}`;
        a.innerHTML = `<span class="platform-name">${name}</span><span class="click-arrow">➜</span>`;
        a.href = '#';
        a.addEventListener('click', (e) => {
            e.preventDefault();
            openTrackedLink(url, 'click_streaming', {
                link_tipo: name,
                plataforma: name,
                musica: currentSong,
                artista: currentArtist
            });
        });
        linksContainer.appendChild(a);
    }

    function createSocialButton(text, url, cssClass) {
        const a = document.createElement('a');
        a.className = `social-btn ${cssClass}`;
        a.textContent = text;
        a.href = '#';
        a.addEventListener('click', (e) => {
            e.preventDefault();
            openTrackedLink(url, 'click_social_sound', {
                link_tipo: text,
                musica: currentSong,
                artista: currentArtist
            });
        });
        socialBtns.appendChild(a);
    }

    // ========================================================================
    //  BUSCA PRINCIPAL
    // ========================================================================
    async function searchMusic() {
        const artist = artistInput.value.trim() || currentArtist;
        const song = songInput.value.trim() || currentSong;
        if (!artist || !song) {
            alert('Preencha o artista e a música.');
            return;
        }

        currentArtist = artist;
        currentSong = song;
        loading.style.display = 'block';
        resultsContainer.style.display = 'none';
        linksContainer.innerHTML = '';
        socialBtns.innerHTML = '';
        artwork.style.display = 'none';
        previewBtn.style.display = 'none';
        previewBtn.classList.remove('is-playing');
        if (previewAudio) { previewAudio.pause(); previewAudio = null; }
        currentPreviewUrl = '';

        const query = `${artist} ${song}`;
        trackEvent('search_submitted', { artista: artist, musica: song, query });

        // 1. iTunes
        try {
            const resp = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1&country=BR`);
            const data = await resp.json();
            if (data.results && data.results.length) {
                const track = data.results[0];
                if (track.artworkUrl100) {
                    artwork.src = track.artworkUrl100.replace('100x100', '300x300');
                    artwork.style.display = 'block';
                    updateMetaTags(track.trackName, `${track.artistName} - Ouça agora`, artwork.src);
                }
                songTitle.textContent = track.trackName || song;
                songArtist.textContent = track.artistName || artist;
                currentPreviewUrl = track.previewUrl || '';
                if (currentPreviewUrl) {
                    previewBtn.style.display = 'block';
                    previewBtn.textContent = '▶ Ouvir prévia';
                }
                createPlatformButton('Apple Music', track.trackViewUrl, 'appleMusic');
            } else {
                songTitle.textContent = song;
                songArtist.textContent = artist;
                updateMetaTags(song, artist, artworkUrl || '');
            }
        } catch (e) {
            console.warn('iTunes error:', e);
            songTitle.textContent = song;
            songArtist.textContent = artist;
        }

        if (!artwork.style.display || artwork.style.display === 'none') {
            if (artworkUrl) {
                artwork.src = artworkUrl;
                artwork.style.display = 'block';
            }
        }

        // 2. Deezer
        try {
            const deezerData = await searchDeezer(query);
            if (deezerData) {
                createPlatformButton('Deezer', deezerData.link, 'deezer');
            }
        } catch (e) { console.warn('Deezer error:', e); }

        // 3. Plataformas fixas
        const platforms = [
            { name: 'Spotify', url: `https://open.spotify.com/search/${encodeURIComponent(query)}`, cls: 'spotify' },
            { name: 'YouTube Music', url: `https://music.youtube.com/search?q=${encodeURIComponent(query)}`, cls: 'youtubeMusic' },
            { name: 'TikTok Music', url: `https://www.tiktok.com/search/music?q=${encodeURIComponent(query)}`, cls: 'tiktokMusic' },
            { name: 'Amazon Music', url: `https://music.amazon.com.br/search/${encodeURIComponent(query)}`, cls: 'amazonMusic' },
            { name: 'SoundCloud', url: `https://soundcloud.com/search/sounds?q=${encodeURIComponent(query)}`, cls: 'soundCloud' },
            { name: 'Tidal', url: `https://listen.tidal.com/search?q=${encodeURIComponent(query)}`, cls: 'tidal' }
        ];
        platforms.forEach(p => createPlatformButton(p.name, p.url, p.cls));

        // 4. Links sociais
        let hasSocial = false;
        if (tiktokUrl) { createSocialButton('🎵 Usar Som no TikTok', tiktokUrl, 'tiktok'); hasSocial = true; }
        if (instagramUrl) { createSocialButton('📸 Usar Som no Instagram', instagramUrl, 'instagram'); hasSocial = true; }
        socialLinksContainer.style.display = hasSocial ? 'block' : 'none';

        // 5. Compartilhar
        if (navigator.share) {
            shareBtn.style.display = 'block';
            shareBtn.textContent = '📤 Compartilhar link';
            shareBtn.onclick = () => {
                navigator.share({
                    title: songTitle.textContent || 'Música',
                    text: getShareText(),
                    url: getShareUrl()
                }).then(() => trackEvent('click_share', { link_tipo: 'Compartilhar nativo', musica: currentSong }));
            };
        } else if (navigator.clipboard) {
            shareBtn.style.display = 'block';
            shareBtn.textContent = '📋 Copiar link';
            shareBtn.onclick = () => {
                navigator.clipboard.writeText(getShareUrl()).then(() => {
                    shareBtn.textContent = '✅ Copiado!';
                    setTimeout(() => shareBtn.textContent = '📋 Copiar link', 2000);
                    trackEvent('click_share', { link_tipo: 'Copiar link (desktop)', musica: currentSong });
                });
            };
        }

        // 6. Prévia
        previewBtn.onclick = () => {
            if (!currentPreviewUrl) return;
            if (!previewAudio) {
                previewAudio = new Audio(currentPreviewUrl);
                previewAudio.onended = () => {
                    previewBtn.textContent = '▶ Ouvir prévia';
                    previewBtn.classList.remove('is-playing');
                };
            }
            if (previewAudio.paused) {
                previewAudio.play().then(() => {
                    previewBtn.textContent = '⏸ Pausar';
                    previewBtn.classList.add('is-playing');
                    trackEvent('click_preview', { musica: currentSong, link_tipo: 'Preview iTunes' });
                }).catch(() => {});
            } else {
                previewAudio.pause();
                previewBtn.textContent = '▶ Ouvir prévia';
                previewBtn.classList.remove('is-playing');
            }
        };

        setupQuickShare();
        renderEmbeds();

        resultsContainer.style.display = 'block';
        loading.style.display = 'none';
        trackEvent('results_rendered', { musica: currentSong, artista: currentArtist });
        renderRanking();
    }

    // ----- DEEZER (JSONP) -----
    function searchDeezer(query) {
        return new Promise((resolve, reject) => {
            const callback = 'deezerCb' + Date.now();
            const script = document.createElement('script');
            window[callback] = function(data) {
                try { document.body.removeChild(script); } catch(e) {}
                delete window[callback];
                if (data && data.data && data.data.length) resolve(data.data[0]);
                else resolve(null);
            };
            script.src = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&output=jsonp&callback=${callback}`;
            script.onerror = () => { reject(new Error('Deezer fail')); };
            document.body.appendChild(script);
            setTimeout(() => {
                if (window[callback]) {
                    try { document.body.removeChild(script); } catch(e) {}
                    delete window[callback];
                    resolve(null);
                }
            }, 4000);
        });
    }

    // ========================================================================
    //  CURTIR
    // ========================================================================
    likeBtn.addEventListener('click', () => {
        if (!liked) {
            liked = true;
            likeCount++;
            localStorage.setItem('musicLikeCount', String(likeCount));
            localStorage.setItem('musicLiked', 'true');
            likeCountSpan.textContent = likeCount;
            likeBtn.textContent = '❤️ Curtido';
            likeBtn.classList.add('liked');
            trackEvent('like_music', { musica: currentSong, artista: currentArtist });
        } else {
            liked = false;
            likeCount--;
            localStorage.setItem('musicLikeCount', String(likeCount));
            localStorage.setItem('musicLiked', 'false');
            likeCountSpan.textContent = likeCount;
            likeBtn.textContent = 'Curtir';
            likeBtn.classList.remove('liked');
        }
    });

    // ========================================================================
    //  CARREGAMENTO INICIAL
    // ========================================================================
    window.addEventListener('load', async () => {
        // Inicializa ranking com dados falsos se vazio
        initRankingWithFakeData();

        await renderAlbums();
        renderRanking();

        if (artistaUrl && musicaUrl) {
            artistInput.value = artistaUrl;
            songInput.value = musicaUrl;
            currentArtist = artistaUrl;
            currentSong = musicaUrl;
            document.getElementById('search-box').style.display = 'none';
            searchMusic();
        } else {
            updateMetaTags('🎵 Marcelo Hacker', 'Ouça minhas músicas em todas as plataformas.', '');
        }

        searchBtn.addEventListener('click', searchMusic);
        artistInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchMusic(); });
        songInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') searchMusic(); });
    });
</script>
