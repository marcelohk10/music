    <style>

<body>

    <div class="container">
        <div class="search-box" id="search-box">
            <h1>Links de Música</h1>
            <p class="intro-text" id="intro-text">
                Digite o nome do artista e da música para encontrar onde ouvir em várias plataformas.
            </p>
            <input type="text" id="artist-input" placeholder="Nome do Artista">
            <input type="text" id="song-input" placeholder="Nome da Música">
            <button id="search-button">Buscar Links</button>
            <div id="loading">Buscando...</div>
        </div>

        <div id="results-container">
            <div id="song-info">
                <img id="artwork" src="" alt="Capa do Álbum">
                <h2 id="song-title"></h2>
                <p id="song-artist"></p>
                <button id="share-button" class="social-button" style="display: none;"></button>
                <button id="preview-button" class="social-button" style="display: none;"></button>
            </div>
            <div id="links-container"></div>

            <div id="embed-container">
                <h3>Ouvir aqui também</h3>
                <div id="embed-content"></div>
            </div>

            <div id="social-links-container">
                <h3>Usar esta música em seu post</h3>
                <div id="social-buttons"></div>
            </div>
        </div>
    </div>

    <script>
        // Elementos do DOM
        const artistInput = document.getElementById('artist-input');
        const songInput = document.getElementById('song-input');
        const searchButton = document.getElementById('search-button');
        const loadingMessage = document.getElementById('loading');
        const resultsContainer = document.getElementById('results-container');
        const artwork = document.getElementById('artwork');
        const songTitle = document.getElementById('song-title');
        const songArtist = document.getElementById('song-artist');
        const linksContainer = document.getElementById('links-container');
        const embedContainer = document.getElementById('embed-container');
        const embedContent = document.getElementById('embed-content');
        const socialLinksContainer = document.getElementById('social-links-container');
        const socialButtonsContainer = document.getElementById('social-buttons');
        const shareButton = document.getElementById('share-button');
        const previewButton = document.getElementById('preview-button');
        const searchBox = document.getElementById('search-box');
        const introText = document.getElementById('intro-text');

        // Parâmetros da URL
        const params = new URLSearchParams(window.location.search);
        const artistaDaUrl = params.get('artista');
        const musicaDaUrl = params.get('musica');
        const artworkUrlParam = params.get('artwork_url');
        const tiktokUrl = params.get('tiktok_url');
        const instagramUrl = params.get('ig_url');
        const youtubeIdParam = params.get('youtube_id');
        const youtubeUrlParam = params.get('youtube_url');
        const soundcloudUrlParam = params.get('soundcloud_url');

        let currentSongContext = { artista: '', musica: '', source: 'manual' };
        let currentPreviewUrl = '';
        let previewAudio = null;

        const canonicalSiteBaseUrl = 'https://marcelohk10.github.io/music/';

        // ---------- UTILITÁRIOS ----------
        function setCurrentSongContext(artista, musica, source) {
            currentSongContext = { artista: artista || '', musica: musica || '', source: source || 'manual' };
        }

        function getSharePageUrl() {
            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                return window.location.href;
            }
            const shareUrl = new URL(canonicalSiteBaseUrl);
            shareUrl.search = window.location.search;
            shareUrl.hash = window.location.hash;
            return shareUrl.toString();
        }

        function buildShareText(songName, artistName) {
            if (songName && artistName) return `Ouça "${songName}" de ${artistName} em todas as plataformas:`;
            if (songName) return `Ouça "${songName}" em todas as plataformas:`;
            return 'Ouça esta música em todas as plataformas:';
        }

        function getActiveTrackQuery() {
            const artist = currentSongContext.artista || artistInput.value || '';
            const song = currentSongContext.musica || songInput.value || '';
            return [artist, song].filter(Boolean).join(' ');
        }

        function extractYouTubeId(input) {
            if (!input) return '';
            if (/^[a-zA-Z0-9_-]{11}$/.test(input)) return input;
            try {
                const url = new URL(input);
                if (url.hostname.includes('youtu.be')) return url.pathname.replace('/', '').trim();
                const v = url.searchParams.get('v');
                if (v) return v;
                const embedMatch = url.pathname.match(/\/embed\/([a-zA-Z0-9_-]{11})/);
                if (embedMatch) return embedMatch[1];
            } catch (e) { /* ignora */ }
            return '';
        }

        // ---------- RASTREAMENTO (ANALYTICS) ----------
        function trackEvent(eventName, params = {}, onTracked) {
            console.log(`[Analytics] ${eventName}`, params);
            if (typeof gtag === 'function') {
                gtag('event', eventName, {
                    ...params,
                    send_to: 'G-2VQ0ZJ5JEY',
                    transport_type: 'beacon',
                    event_callback: typeof onTracked === 'function' ? onTracked : undefined,
                    event_timeout: 1000
                });
            } else if (typeof onTracked === 'function') {
                onTracked();
            }
        }

        // Usado para botões que abrem uma NOVA ABA (streaming, redes sociais, YouTube...)
        function trackExternalClick(eventName, params, url) {
            function openUrl() {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
            // Tenta enviar o evento e depois abre a URL
            trackEvent(eventName, params, () => {
                openUrl();
            });
            // Fallback: se o beacon travar, abre assim mesmo após 1,5s
            setTimeout(openUrl, 1500);
        }

        // (Mantido apenas caso precise redirecionar a página atual – não usado agora)
        function trackClickAndNavigate(eventName, params, url) {
            let navigated = false;
            const go = () => { if (!navigated) { navigated = true; window.location.href = url; } };
            trackEvent(eventName, params, go);
            setTimeout(go, 600);
        }

        // ---------- RENDERIZAÇÃO DE EMBEDS ----------
        function renderEmbeds() {
            embedContent.innerHTML = '';
            const youtubeId = extractYouTubeId(youtubeIdParam || youtubeUrlParam);
            const trackQuery = getActiveTrackQuery();
            const hasYoutube = Boolean(youtubeId);
            const hasSoundCloud = Boolean(soundcloudUrlParam);

            if (!hasYoutube && !hasSoundCloud) {
                if (!trackQuery) { embedContainer.style.display = 'none'; return; }
                const fallbackCard = document.createElement('div');
                fallbackCard.className = 'embed-card';
                fallbackCard.innerHTML = `
                    <div class="embed-card-header">Tentar ouvir em outro lugar</div>
                    <div class="embed-note">Não achei embed direto. Você ainda pode buscar a mesma música nestas plataformas.</div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; padding: 0 14px 14px;">
                        <a class="help-pill primary" href="#" data-youtube-search="1">Buscar no YouTube</a>
                    </div>`;
                embedContent.appendChild(fallbackCard);
                fallbackCard.querySelector('[data-youtube-search="1"]').addEventListener('click', (e) => {
                    e.preventDefault();
                    const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(trackQuery)}`;
                    trackExternalClick('click_youtube', {
                        link_tipo: 'Buscar no YouTube',
                        musica: currentSongContext.musica || songInput.value || '',
                        musica_origem: currentSongContext.musica || songInput.value || '',
                        artista_origem: currentSongContext.artista || artistInput.value || '',
                        source: currentSongContext.source || 'manual',
                        destination_url: url
                    }, url);
                });
                embedContainer.style.display = 'block';
                return;
            }

            if (hasYoutube) {
                const youtubeCard = document.createElement('div');
                youtubeCard.className = 'embed-card';
                youtubeCard.innerHTML = `
                    <div class="embed-card-header">YouTube</div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; padding: 12px 14px 0;">
                        <a class="help-pill primary" href="#" data-youtube-open="1">Abrir no YouTube</a>
                    </div>
                    <iframe class="embed-frame" height="315"
                        src="https://www.youtube.com/embed/${youtubeId}"
                        title="Player do YouTube" loading="lazy"
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                        allowfullscreen></iframe>`;
                embedContent.appendChild(youtubeCard);
                youtubeCard.querySelector('[data-youtube-open="1"]').addEventListener('click', (e) => {
                    e.preventDefault();
                    const url = `https://www.youtube.com/watch?v=${youtubeId}`;
                    trackExternalClick('click_youtube', {
                        link_tipo: 'Abrir no YouTube',
                        musica: currentSongContext.musica || songInput.value || '',
                        musica_origem: currentSongContext.musica || songInput.value || '',
                        artista_origem: currentSongContext.artista || artistInput.value || '',
                        source: currentSongContext.source || 'manual',
                        destination_url: url
                    }, url);
                });
            }

            if (hasSoundCloud) {
                const embedUrl = `https://w.soundcloud.com/player/?url=${encodeURIComponent(soundcloudUrlParam)}&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=true`;
                const soundcloudCard = document.createElement('div');
                soundcloudCard.className = 'embed-card';
                soundcloudCard.innerHTML = `
                    <div class="embed-card-header">SoundCloud</div>
                    <iframe class="embed-frame" height="166" scrolling="no" allow="autoplay"
                        src="${embedUrl}" title="Player do SoundCloud" loading="lazy"></iframe>`;
                embedContent.appendChild(soundcloudCard);
            }
            embedContainer.style.display = 'block';
        }

        // ---------- BOTÕES DE STREAMING E SOCIAIS ----------
        function createLinkButton(platformName, url, platformClass, songQuery) {
            const button = document.createElement('a');
            button.href = url;
            button.target = '_blank';
            button.rel = 'noopener noreferrer';
            button.className = 'music-platform-button ' + platformClass;
            button.innerHTML = `<span class="platform-name">${platformName}</span>`;
            button.addEventListener('click', (e) => {
                e.preventDefault();
                trackExternalClick('click_streaming', {
                    link_tipo: platformName,
                    musica: songQuery,
                    musica_origem: currentSongContext.musica || songQuery,
                    artista_origem: currentSongContext.artista || '',
                    source: currentSongContext.source || 'manual',
                    destination_url: url,
                    platform_class: platformClass,
                    platform_name: platformName
                }, url);
            });
            linksContainer.appendChild(button);
        }

        function createSocialButton(text, url, cssClass, songQuery) {
            const button = document.createElement('a');
            button.href = url;
            button.target = '_blank';
            button.rel = 'noopener noreferrer';
            button.className = 'social-button ' + cssClass;
            button.innerText = text;
            button.addEventListener('click', (e) => {
                e.preventDefault();
                trackExternalClick('click_social_sound', {
                    link_tipo: text,
                    musica: songQuery,
                    musica_origem: currentSongContext.musica || songQuery,
                    artista_origem: currentSongContext.artista || '',
                    source: currentSongContext.source || 'manual',
                    destination_url: url,
                    platform_class: cssClass,
                    platform_name: text
                }, url);
            });
            socialButtonsContainer.appendChild(button);
        }

        // ---------- BOTÃO SHARE E PRÉVIA ----------
        function setupShareButton(shareSongTitle, shareSongArtist, shareUrl, query) {
            if (navigator.share) {
                shareButton.innerText = 'Compartilhar Link 📲';
                shareButton.classList.remove('copy-mode');
                shareButton.onclick = (e) => {
                    e.preventDefault();
                    navigator.share({
                        title: shareSongTitle || 'Música',
                        text: buildShareText(shareSongTitle, shareSongArtist),
                        url: shareUrl
                    }).then(() => {
                        trackEvent('click_share', {
                            link_tipo: 'Compartilhar (Nativo)',
                            musica: query,
                            musica_origem: currentSongContext.musica || query,
                            artista_origem: currentSongContext.artista || '',
                            source: currentSongContext.source || 'manual',
                            destination_url: shareUrl
                        });
                    }).catch(err => console.error('Erro no share:', err));
                };
                shareButton.style.display = 'block';
            } else if (navigator.clipboard) {
                shareButton.innerText = 'Copiar Link (Compartilhar)';
                shareButton.classList.add('copy-mode');
                shareButton.onclick = (e) => {
                    e.preventDefault();
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        shareButton.innerText = 'Link Copiado! 👍';
                        trackEvent('click_share', {
                            link_tipo: 'Copiar Link (Desktop)',
                            musica: query,
                            musica_origem: currentSongContext.musica || query,
                            artista_origem: currentSongContext.artista || '',
                            source: currentSongContext.source || 'manual',
                            destination_url: shareUrl
                        });
                        setTimeout(() => { shareButton.innerText = 'Copiar Link (Compartilhar)'; }, 2000);
                    }).catch(err => console.error('Erro ao copiar:', err));
                };
                shareButton.style.display = 'block';
            } else {
                shareButton.style.display = 'none';
            }
        }

        previewButton.addEventListener('click', () => {
            if (!currentPreviewUrl) return;
            if (!previewAudio) {
                previewAudio = new Audio(currentPreviewUrl);
                previewAudio.addEventListener('ended', () => {
                    previewButton.innerText = 'Ouvir prévia de 30s';
                    previewButton.classList.remove('is-playing');
                });
            }
            if (previewAudio.paused) {
                previewAudio.play().then(() => {
                    previewButton.innerText = 'Pausar prévia';
                    previewButton.classList.add('is-playing');
                    trackEvent('click_preview', {
                        musica: currentSongContext.musica || songInput.value || '',
                        link_tipo: 'Preview iTunes',
                        musica_origem: currentSongContext.musica || songInput.value || '',
                        artista_origem: currentSongContext.artista || artistInput.value || '',
                        source: currentSongContext.source || 'manual',
                        destination_url: currentPreviewUrl
                    });
                }).catch(err => console.error('Erro ao tocar prévia:', err));
            } else {
                previewAudio.pause();
                previewButton.innerText = 'Ouvir prévia de 30s';
                previewButton.classList.remove('is-playing');
            }
        });

        // ---------- BUSCA PRINCIPAL ----------
        async function searchMusic() {
            const artist = artistInput.value.trim();
            const song = songInput.value.trim();

            if (!artist || !song) {
                alert('Por favor, preencha o artista e a música.');
                return;
            }

            loadingMessage.style.display = 'block';
            resultsContainer.style.display = 'none';
            linksContainer.innerHTML = '';
            socialButtonsContainer.innerHTML = '';
            artwork.style.display = 'none';
            previewButton.style.display = 'none';
            previewButton.innerText = 'Ouvir prévia de 30s';
            previewButton.classList.remove('is-playing');
            if (previewAudio) { previewAudio.pause(); previewAudio = null; }
            currentPreviewUrl = '';

            const query = `${artist} ${song}`;
            setCurrentSongContext(artist, song, 'manual');

            trackEvent('search_submitted', {
                artista: artist,
                musica: song,
                musica_busca: query,
                has_artwork_url: Boolean(artworkUrlParam),
                has_tiktok_url: Boolean(tiktokUrl),
                has_instagram_url: Boolean(instagramUrl)
            });

            const platformsToCreate = [
                { name: 'Spotify', url: `https://open.spotify.com/search/${encodeURIComponent(query)}`, class: 'spotify' },
                { name: 'YouTube Music', url: `https://music.youtube.com/search?q=${encodeURIComponent(query)}`, class: 'youtubeMusic' },
                { name: 'TikTok Music', url: `https://www.tiktok.com/search/music?q=${encodeURIComponent(query)}`, class: 'tiktokMusic' },
                { name: 'Amazon Music', url: `https://music.amazon.com.br/search/${encodeURIComponent(query)}`, class: 'amazonMusic' },
                { name: 'SoundCloud', url: `https://soundcloud.com/search/sounds?q=${encodeURIComponent(query)}`, class: 'soundCloud' },
                { name: 'Tidal', url: `https://listen.tidal.com/search?q=${encodeURIComponent(query)}`, class: 'tidal' }
            ];

            let foundArtwork = false;

            try {
                // 1. iTunes / Apple Music
                try {
                    const itunesUrl = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=1&country=BR`;
                    const itunesResponse = await fetch(itunesUrl);
                    if (itunesResponse.ok) {
                        const itunesData = await itunesResponse.json();
                        if (itunesData.results && itunesData.results.length > 0) {
                            const track = itunesData.results[0];
                            if (track.artworkUrl100) {
                                artwork.src = track.artworkUrl100.replace('100x100', '300x300');
                                artwork.style.display = 'block';
                                foundArtwork = true;
                            }
                            songTitle.innerText = track.trackName;
                            songArtist.innerText = track.artistName;
                            currentPreviewUrl = track.previewUrl || '';
                            previewButton.style.display = currentPreviewUrl ? 'block' : 'none';
                            platformsToCreate.unshift({ name: 'Apple Music', url: track.trackViewUrl, class: 'appleMusic' });
                        }
                    }
                } catch (e) {
                    console.error('Erro ao buscar no iTunes:', e);
                }

                // 2. Fallback para artwork da URL
                if (!foundArtwork && artworkUrlParam) {
                    artwork.src = artworkUrlParam;
                    artwork.style.display = 'block';
                    foundArtwork = true;
                }
                if (!foundArtwork && songTitle.innerText === '') {
                    songTitle.innerText = song;
                    songArtist.innerText = artist;
                }

                // 3. Deezer
                try {
                    const deezerData = await searchDeezer(query);
                    if (deezerData) {
                        platformsToCreate.unshift({ name: 'Deezer', url: deezerData.link, class: 'deezer' });
                    }
                } catch (e) {
                    console.error('Erro ao buscar no Deezer:', e);
                }

                // 4. Criar botões de streaming
                platformsToCreate.forEach(p => {
                    createLinkButton(p.name, p.url, p.class, query);
                });

                // 5. Botões sociais
                let socialLinksFound = false;
                if (tiktokUrl) { createSocialButton('Usar Som no TikTok', tiktokUrl, 'tiktok-button', query); socialLinksFound = true; }
                if (instagramUrl) { createSocialButton('Usar Som no Instagram', instagramUrl, 'instagram-button', query); socialLinksFound = true; }
                socialLinksContainer.style.display = socialLinksFound ? 'block' : 'none';

                // 6. Compartilhar
                const shareSongTitle = songTitle.innerText;
                const shareSongArtist = songArtist.innerText;
                const shareUrl = getSharePageUrl();
                setupShareButton(shareSongTitle, shareSongArtist, shareUrl, query);

                // 7. Exibir
                resultsContainer.style.display = 'block';
                renderEmbeds();

                trackEvent('results_rendered', {
                    artista: artist,
                    musica: song,
                    musica_busca: query,
                    musica_origem: currentSongContext.musica,
                    artista_origem: currentSongContext.artista,
                    source: currentSongContext.source,
                    streaming_count: platformsToCreate.length,
                    social_count: socialLinksFound ? 2 : 0,
                    has_artwork: foundArtwork
                });

            } catch (error) {
                console.error('Erro geral na busca:', error);
                alert('Ocorreu um erro ao buscar os dados da música. Verifique o console para mais detalhes.');
            } finally {
                loadingMessage.style.display = 'none';
            }
        }

        // Deezer via JSONP
        function searchDeezer(query) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                const callbackName = 'deezerCallback' + Date.now();
                window[callbackName] = function(data) {
                    try { document.body.removeChild(script); } catch(e) {}
                    delete window[callbackName];
                    if (data && data.data && data.data.length > 0) {
                        resolve(data.data[0]);
                    } else {
                        resolve(null);
                    }
                };
                script.src = `https://api.deezer.com/search?q=${encodeURIComponent(query)}&output=jsonp&callback=${callbackName}`;
                script.onerror = () => {
                    try { document.body.removeChild(script); } catch(e) {}
                    delete window[callbackName];
                    reject(new Error('Falha ao carregar API do Deezer'));
                };
                document.body.appendChild(script);
                setTimeout(() => {
                    if (window[callbackName]) {
                        try { document.body.removeChild(script); } catch(e) {}
                        delete window[callbackName];
                        reject(new Error('Timeout na busca do Deezer'));
                    }
                }, 5000);
            });
        }

        searchButton.addEventListener('click', searchMusic);

        // Carregamento automático se houver parâmetros na URL
        window.addEventListener('load', () => {
            renderEmbeds();
            if (artistaDaUrl && musicaDaUrl) {
                if (searchBox) searchBox.style.display = 'none';
                if (introText) introText.style.display = 'none';
                artistInput.value = artistaDaUrl;
                songInput.value = musicaDaUrl;
                setCurrentSongContext(artistaDaUrl, musicaDaUrl, 'url');

                if (typeof gtag === 'function') {
                    gtag('event', 'page_view_song', {
                        'musica': `${artistaDaUrl} ${musicaDaUrl}`,
                        'artista': artistaDaUrl
                    });
                }
                trackEvent('song_landing_view', {
                    musica: `${artistaDaUrl} ${musicaDaUrl}`,
                    artista: artistaDaUrl,
                    musica_origem: `${artistaDaUrl} ${musicaDaUrl}`,
                    artista_origem: artistaDaUrl,
                    source: 'url',
                    has_artwork_url: Boolean(artworkUrlParam),
                    has_tiktok_url: Boolean(tiktokUrl),
                    has_instagram_url: Boolean(instagramUrl)
                });
                searchButton.click();
            }
        });
    </script>
</body>
</html>
